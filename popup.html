<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      body {
        width: 220px;
        background-color: #000000;
        color: #FFFFFF;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 12px;
      }
      .container {
        border: 1px solid #2F3336;
        border-radius: 12px;
        padding: 16px;
        background-color: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 0 10px rgba(29, 155, 240, 0.1);
      }
      h3 {
        font-size: 18px;
        font-weight: 700;
        margin: 0 0 8px 0;
        text-align: center;
      }
      p {
        font-size: 15px;
        font-weight: 500;
        margin: 0 0 16px 0;
        text-align: center;
        color: #E7E9EA;
      }
      
      /* Toggle Styles */
      .toggle-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid #2F3336;
      }
      .toggle-label {
        font-size: 14px;
        font-weight: 600;
        color: #E7E9EA;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 22px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #2F3336;
        transition: .4s;
        border-radius: 22px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: .2s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #1D9BF0;
      }
      input:checked + .slider:before {
        transform: translateX(18px);
      }

      /* Button Styles */
      .btn-group {
        display: flex;
        gap: 8px;
        justify-content: center;
        width: 100%;
      }
      button {
        background-color: transparent;
        color: #1D9BF0;
        border: 1px solid #2F3336;
        border-radius: 20px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        outline: none;
      }
      button:hover {
        background-color: rgba(29, 155, 240, 0.1);
        border-color: #1D9BF0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>Grok Blocker</h3>
      
      <div class="toggle-container">
        <span class="toggle-label">Extension Status</span>
        <label class="switch">
          <input type="checkbox" id="toggleSwitch">
          <span class="slider"></span>
        </label>
      </div>

      <p id="count" style="margin-bottom: 12px;">Blocked: 0</p>
      
      <div class="btn-group">
        <button id="resetBtn">Reset Count</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
