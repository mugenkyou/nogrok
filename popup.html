<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>No Grok</title>
  <style>
    /* Reset & Base - Monochrome Theme */
    body {
      background-color: #000000;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 280px;
      margin: 0;
      padding: 16px;
      font-size: 14px;
      overflow-x: hidden;
    }

    button { font-family: inherit; }

    /* Header */
    h3 {
      color: #FFFFFF;
      margin: 0 0 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      border-bottom: 2px solid #fff;
      padding-bottom: 12px;
      display: inline-block;
      width: 100%;
    }

    /* Main Card */
    .status-card {
      background: #000;
      border: 1px solid #333;
      border-radius: 0; /* Brutalist/clean look */
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Toggle Row */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }

    .toggle-label {
      font-weight: 700;
      color: #fff;
      font-size: 15px;
    }

    /* Counter Row */
    .counter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .count-label { color: #888; font-size: 13px; }
    #count { color: #fff; font-weight: 800; font-size: 16px; font-family: monospace; }

    /* Switch CSS (B&W) */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333;
      transition: .3s;
    }
    .slider:before {
      position: absolute; content: "";
      height: 16px; width: 16px;
      left: 4px; bottom: 4px;
      background-color: #000;
      transition: .3s;
    }
    input:checked + .slider { background-color: #fff; }
    input:checked + .slider:before { transform: translateX(20px); }

    /* Buttons (B&W) */
    .btn-action {
      background: #000;
      border: 1px solid #fff;
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-action:hover {
      background: #fff;
      color: #000;
    }

    .btn-tiny {
      background: #fff;
      color: #000;
      padding: 4px 12px;
      font-size: 16px;
      border: 1px solid #fff;
      cursor: pointer;
      font-weight: 700;
      line-height: 1;
    }
    .btn-tiny:hover {
      background: #000;
      color: #fff;
    }
    
    /* Manage Section */
    #keywordsSection {
      margin-top: 12px;
      border-top: 1px solid #333;
      padding-top: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    #newKeyword {
      flex: 1;
      background: #000;
      border: 1px solid #333;
      color: #fff;
      padding: 8px;
      outline: none;
      font-size: 13px;
      font-family: inherit;
    }
    #newKeyword:focus { border-color: #fff; }

    /* Tags */
    #tagsContainer {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
      max-height: 140px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #fff #000;
    }
    
    .tag {
      background: #000;
      border: 1px solid #fff;
      color: #fff;
      padding: 4px 8px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }
    
    .tag-remove {
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    .tag-remove:hover { color: #888; }

    #saveKeywords {
      background: #fff;
      color: #000;
      border: 1px solid #fff;
      width: 100%;
      padding: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      font-size: 12px;
    }
    #saveKeywords:hover { background: #000; color: #fff; }

    .footer-actions {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    #reset {
      border: 1px solid #333;
      color: #888;
      background: #000;
    }
    #reset:hover {
      border-color: #fff;
      color: #fff;
    }

  </style>
</head>
<body>
  <h3>No Grok</h3>
  
  <div class="status-card">
    <div class="toggle-row">
      <span class="toggle-label">Blocking Active</span>
      <label class="switch">
        <input type="checkbox" id="toggleSwitch">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="counter-row">
      <span class="count-label">Blocked Posts</span>
      <span id="count">0</span>
    </div>
  </div>

  <div class="footer-actions">
    <button id="manageKeywords" class="btn-action">Manage Keywords +</button>
    
    <div id="keywordsSection" style="display:none;">
      <div class="input-group">
        <input id="newKeyword" type="text" placeholder="Add custom phrase...">
        <button id="addKeyword" class="btn-tiny">+</button>
      </div>
      
      <div id="tagsContainer">
        <!-- Tags injected by JS -->
      </div>
  
      <button id="saveKeywords">Save List</button>
    </div>

    <button id="reset" class="btn-action">Reset Counter</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
