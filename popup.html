<!DOCTYPE html>
<html>
<head>
  <title>Grok Blocker</title>
  <style>
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; width: 220px; padding: 12px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    h3 { color: #1D9BF0; margin: 0 0 10px; text-align: center; font-size: 18px; }
    p { margin: 5px 0; font-size: 14px; }
    input { width: 100%; padding: 6px; background: #2F3336; border: 1px solid #1D9BF0; color: #fff; border-radius: 4px; margin-bottom: 8px; }
    button { background: #1D9BF0; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; width: 100%; }
    button:hover { background: #0C84E4; }
    #reset { background: #2F3336; margin-top: 10px; }
  </style>
</head>
<body>
  <h3>Grok Blocker</h3>
  <p id="count">Blocked posts: 0</p>
  <input id="blockPhrase" type="text" placeholder="Enter phrase to block (e.g., testblock)">
  <button id="save">Save Phrase</button>
  <button id="reset">Reset Count</button>
  <script src="popup.js"></script>
</body>
</html>
