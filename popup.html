<!DOCTYPE html>
<html>
<head>
  <title>Grok Blocker</title>
  <style>
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; width: 220px; padding: 16px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    h3 { color: #1D9BF0; margin: 0 0 16px; text-align: center; font-size: 18px; }
    
    /* Toggle Switch */
    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2F3336;
    }
    .toggle-label { font-size: 14px; font-weight: 600; color: #E7E9EA; }
    .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2F3336; transition: .4s; border-radius: 22px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .2s; border-radius: 50%; }
    input:checked + .slider { background-color: #1D9BF0; }
    input:checked + .slider:before { transform: translateX(18px); }

    p#count { font-size: 16px; font-weight: bold; margin-bottom: 12px; text-align: center; }
    button { background: transparent; color: #1D9BF0; border: 1px solid #2F3336; padding: 6px 12px; border-radius: 20px; cursor: pointer; width: 100%; font-weight: 600; font-size: 13px; }
    button:hover { background: rgba(29, 155, 240, 0.1); border-color: #1D9BF0; }
  </style>
</head>
<body>
  <h3>Grok Blocker</h3>
  
  <div class="toggle-container">
    <span class="toggle-label">Status</span>
    <label class="switch">
      <input type="checkbox" id="toggleSwitch">
      <span class="slider"></span>
    </label>
  </div>

  <p id="count">Blocked: 0</p>
  <button id="reset">Reset Count</button>
  
  <!-- Custom Keywords UI -->
  <button id="manageKeywords" style="margin-top:12px; background:#333; color:#fff; border:1px solid #536471;">Manage More Keywords</button>
  
  <div id="keywordsSection" style="display:none; margin-top:12px;">
    <div style="display: flex; gap: 6px; margin-bottom: 8px;">
      <input id="newKeyword" type="text" placeholder="Enter word..." style="flex:1; padding:6px; background:#16181C; border:1px solid #1D9BF0; color:#fff; border-radius:4px; margin:0;">
      <button id="addKeyword" style="width:auto; padding:0 12px; margin:0; background:#1D9BF0; color:white;">+</button>
    </div>
    
    <div id="tagsContainer" style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; max-height: 120px; overflow-y: auto;">
      <!-- Tags will appear here -->
    </div>

    <button id="saveKeywords" style="background:#1D9BF0; color:#fff;">Save List</button>
    <style>
      .tag { background: #16181C; border: 1px solid #2F3336; border-radius: 12px; padding: 4px 10px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
      .tag-remove { cursor: pointer; color: #F4212E; font-weight: bold; font-size: 14px; }
      .tag-remove:hover { color: #ffadad; }
    </style>
  </div>

  <script src="popup.js"></script>
</body>
</html>
